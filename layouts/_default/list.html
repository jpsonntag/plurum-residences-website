{{ define "main" }}
<section class="section pageContent">
  <p class="eyebrow">Plurum Residences</p>
  <h1>{{ .Title }}</h1>
  <div class="cards residenceGrid">
    {{ range where .Pages ".Params.status" "ne" "draft" }}
      <article class="residenceCard">
        <div class="residenceBody">
          {{ with .Params.status }}<span class="badge">{{ partial "status-label.html" . }}</span>{{ end }}
          <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
          <p>{{ .Params.teaser | default .Summary }}</p>
        </div>
      </article>
    {{ end }}
  </div>
</section>
{{ end }}
